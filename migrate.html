function log(msg, type='info') {
  const div = document.getElementById('log');
  div.style.display = 'block';
  div.innerHTML += `<div class="${type}">${msg}</div>`;
  div.scrollTop = div.scrollHeight;
}

async function migrate() {
  const btn = document.getElementById('migrateBtn');
  btn.disabled = true;
  btn.textContent = 'Migrating…';
  log(`Starting migration of ${DATA.length} items…`, 'info');

  let success = 0;
  let failed = 0;

  for (const item of DATA) {
    const row = {
      id: item.id,
      title: item.title || '',
      type: item.type || '',
      year: item.year || '',
      poster: item.poster || '',
      summary: item.summary || '',
      status: item.status || 'watchlist',
      services: JSON.stringify(item.services || []),
      genres: JSON.stringify(item.genres || []),
      rating: item.rating || 0,
      review: item.review || '',
      added: item.added || new Date().toISOString()
    };

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/items`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify(row)
      });
      if (res.ok || res.status === 201) {
        log(`✓ ${item.title}`, 'ok');
        success++;
      } else {
        const err = await res.text();
        log(`✗ ${item.title} — ${err}`, 'err');
        failed++;
      }
    } catch(e) {
      log(`✗ ${item.title} — ${e.message}`, 'err');
      failed++;
    }

    // Small delay to avoid rate limiting
    await new Promise(r => setTimeout(r, 80));
  }

  log(``, 'info');
  log(`🎉 Migration complete! ${success} succeeded, ${failed} failed.`, 'done');
  btn.textContent = 'Done!';
}
</script>
