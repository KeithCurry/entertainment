<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reelhouse — Watch Library</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c14;
    --bg2: #0d1420;
    --bg3: #111a2a;
    --card: #0f1822;
    --card-hover: #162030;
    --border: #1e2d45;
    --accent: #e85d26;
    --accent2: #ff8c55;
    --accent-dim: rgba(232,93,38,0.15);
    --cyan: #1ec8d4;
    --cyan-dim: rgba(30,200,212,0.12);
    --text: #e8eef8;
    --text-muted: #7a94b8;
    --text-faint: #3a5070;
    --gold: #f0c040;
    --gold-dim: #6a5010;
    --watchlist: #4a7fa8;
    --watching: #5ab870;
    --finished: #e85d26;
    --gaveup: #804060;
    --radius: 10px;
    --shadow: 0 8px 30px rgba(0,0,0,0.6);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* Subtle scanline texture */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    background: linear-gradient(180deg, #020408 0%, var(--bg2) 100%);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 34px;
    height: 34px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
  }

  .logo-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    color: var(--text);
    letter-spacing: 0.08em;
  }

  .logo-sub {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-faint);
  }

  nav {
    display: flex;
    gap: 0.25rem;
  }

  nav button {
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.5rem 1rem;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s;
  }

  nav button:hover { color: var(--text); background: var(--bg3); }
  nav button.active { color: var(--accent2); background: var(--bg3); }

  /* MAIN */
  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 2rem;
    position: relative;
    z-index: 1;
  }

  /* HERO STRIP */
  .hero-strip {
    background: linear-gradient(135deg, var(--bg3) 0%, #0a1020 100%);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.5rem 2rem;
    margin-bottom: 2rem;
    display: flex;
    gap: 2rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .stat-pill {
    text-align: center;
    flex: 1;
    min-width: 80px;
  }

  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 0.05em;
    color: var(--accent2);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-top: 0.2rem;
  }

  .stat-divider {
    width: 1px;
    height: 40px;
    background: var(--border);
    flex-shrink: 0;
  }

  /* CONTROLS */
  .controls {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    flex: 1;
    min-width: 180px;
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-faint);
    pointer-events: none;
  }

  .search-wrap input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    padding: 0.65rem 1rem 0.65rem 2.5rem;
    border-radius: var(--radius);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--text-faint); }

  .filter-group {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 0.45rem 0.85rem;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .filter-btn:hover { color: var(--text); border-color: var(--text-faint); }
  .filter-btn.f-active { color: var(--accent2); border-color: var(--accent); background: var(--accent-dim); }
  .filter-btn.f-watchlist { color: #80b8e0; border-color: var(--watchlist); background: rgba(74,127,168,0.12); }
  .filter-btn.f-watching { color: #80d890; border-color: var(--watching); background: rgba(90,184,112,0.12); }
  .filter-btn.f-finished { color: var(--accent2); border-color: var(--finished); background: var(--accent-dim); }
  .filter-btn.f-gaveup { color: #c080a0; border-color: var(--gaveup); background: rgba(128,64,96,0.12); }

  .add-btn {
    background: var(--accent);
    border: none;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 0.65rem 1.25rem;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .add-btn:hover { background: var(--accent2); }

  /* STREAMING FILTER */
  .streaming-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .streaming-label {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-right: 0.25rem;
  }

  .stream-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    padding: 0.35rem 0.75rem;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .stream-btn:hover { color: var(--text); border-color: var(--text-faint); }
  .stream-btn.s-active { background: var(--cyan-dim); border-color: var(--cyan); color: var(--cyan); }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 1.25rem;
  }

  /* MOVIE CARD */
  .movie-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
  }

  .movie-card:hover {
    background: var(--card-hover);
    border-color: var(--accent);
    transform: translateY(-4px);
    box-shadow: var(--shadow);
  }

  .movie-poster {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    display: block;
    background: var(--bg3);
  }

  .movie-poster-placeholder {
    width: 100%;
    aspect-ratio: 2/3;
    background: linear-gradient(145deg, var(--bg3), var(--border));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
    color: var(--text-faint);
  }

  .status-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 7px;
    border-radius: 4px;
    font-weight: 700;
  }

  .badge-watchlist { background: rgba(74,127,168,0.88); color: #c0e0ff; }
  .badge-watching { background: rgba(90,184,112,0.88); color: #c0ffd0; }
  .badge-finished { background: rgba(232,93,38,0.88); color: #ffe0c0; }
  .badge-gaveup { background: rgba(128,64,96,0.88); color: #ffc0d8; }

  .type-overlay {
    position: absolute;
    top: 8px;
    right: 8px;
    font-size: 0.6rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: rgba(0,0,0,0.7);
    color: var(--text-muted);
    border-radius: 4px;
    padding: 2px 6px;
  }

  .movie-info {
    padding: 0.7rem;
  }

  .movie-title {
    font-size: 0.88rem;
    font-weight: 500;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 0.2rem;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .movie-year {
    font-size: 0.75rem;
    color: var(--text-faint);
    margin-bottom: 0.4rem;
  }

  .stars {
    display: flex;
    gap: 2px;
  }

  .star { color: var(--gold-dim); font-size: 0.78rem; }
  .star.filled { color: var(--gold); }

  .stream-tags {
    display: flex;
    gap: 3px;
    flex-wrap: wrap;
    margin-top: 0.35rem;
  }

  .stream-tag {
    font-size: 0.6rem;
    letter-spacing: 0.04em;
    background: var(--cyan-dim);
    color: var(--cyan);
    border-radius: 3px;
    padding: 1px 5px;
    white-space: nowrap;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-faint);
    grid-column: 1/-1;
  }

  .empty-state p { margin-top: 0.5rem; font-size: 0.9rem; }

  /* MODALS */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    backdrop-filter: blur(6px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    width: 100%;
    max-width: 640px;
    max-height: 90vh;
    overflow-y: auto;
    transform: translateY(20px);
    transition: transform 0.2s;
  }

  .overlay.open .modal { transform: translateY(0); }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .modal-header h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 0.06em;
    color: var(--accent2);
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--text-faint);
    font-size: 1.4rem;
    cursor: pointer;
    padding: 0.25rem;
    line-height: 1;
    transition: color 0.2s;
  }

  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 1.5rem; }

  .form-row { display: flex; gap: 1rem; margin-bottom: 1rem; }

  .form-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .form-group label {
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-faint);
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    padding: 0.65rem 0.85rem;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--accent); }

  .form-group select option { background: var(--bg2); }
  .form-group textarea { resize: vertical; min-height: 80px; }

  .search-result-list {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-top: 0.5rem;
    max-height: 220px;
    overflow-y: auto;
  }

  .search-result-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.6rem 0.85rem;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:hover { background: var(--card-hover); }

  .result-thumb {
    width: 36px;
    height: 54px;
    object-fit: cover;
    border-radius: 4px;
    background: var(--border);
    flex-shrink: 0;
  }

  .result-info { flex: 1; min-width: 0; }
  .result-title { font-size: 0.88rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .result-meta { font-size: 0.72rem; color: var(--text-muted); }

  .star-rating-input { display: flex; gap: 6px; align-items: center; }

  .star-input {
    font-size: 1.5rem;
    color: var(--gold-dim);
    cursor: pointer;
    transition: color 0.1s;
    background: none;
    border: none;
    padding: 0;
    line-height: 1;
  }

  .star-input.active { color: var(--gold); }
  .star-label { font-size: 0.8rem; color: var(--text-muted); margin-left: 0.5rem; }

  .service-checkboxes {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-top: 0.25rem;
  }

  .service-check {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 0.8rem;
    color: var(--text-muted);
    user-select: none;
  }

  .service-check input { display: none; }
  .service-check.checked { background: var(--cyan-dim); border-color: var(--cyan); color: var(--cyan); }

  .form-actions {
    display: flex;
    gap: 0.75rem;
    justify-content: flex-end;
    margin-top: 1.25rem;
  }

  .btn-secondary {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    padding: 0.65rem 1.25rem;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-secondary:hover { color: var(--text); border-color: var(--text-muted); }

  .btn-primary {
    background: var(--accent);
    border: none;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    padding: 0.65rem 1.25rem;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary:hover { background: var(--accent2); }

  /* DETAIL MODAL */
  .detail-backdrop {
    width: 100%;
    height: 160px;
    object-fit: cover;
    display: block;
    border-radius: 12px 12px 0 0;
    opacity: 0.5;
  }

  .detail-top {
    display: flex;
    gap: 1.25rem;
    margin-bottom: 1.25rem;
  }

  .detail-poster {
    width: 110px;
    flex-shrink: 0;
    border-radius: 8px;
    overflow: hidden;
    margin-top: -60px;
    border: 2px solid var(--border);
    box-shadow: var(--shadow);
  }

  .detail-poster img { width: 100%; display: block; }

  .detail-poster-placeholder {
    width: 110px;
    height: 165px;
    background: var(--bg3);
    border-radius: 8px;
    margin-top: -60px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
    color: var(--text-faint);
    border: 2px solid var(--border);
  }

  .detail-meta { flex: 1; padding-top: 0.5rem; min-width: 0; }

  .detail-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 0.04em;
    color: var(--text);
    margin-bottom: 0.2rem;
    line-height: 1.1;
  }

  .detail-year { font-size: 0.82rem; color: var(--text-faint); margin-bottom: 0.6rem; }

  .detail-stars { display: flex; gap: 4px; align-items: center; margin-bottom: 0.6rem; }

  .detail-star { font-size: 1.2rem; color: var(--gold-dim); cursor: pointer; transition: color 0.1s; }
  .detail-star.filled { color: var(--gold); }
  .rating-desc { font-size: 0.75rem; color: var(--text-muted); font-style: italic; margin-left: 0.4rem; }

  .detail-summary {
    font-size: 0.86rem;
    line-height: 1.7;
    color: var(--text-muted);
    margin-bottom: 1rem;
  }

  .detail-review-label {
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 0.4rem;
  }

  .detail-review-area {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    padding: 0.75rem;
    border-radius: 8px;
    resize: vertical;
    min-height: 80px;
    outline: none;
    transition: border-color 0.2s;
  }

  .detail-review-area:focus { border-color: var(--accent); }

  .detail-actions {
    display: flex;
    justify-content: space-between;
    margin-top: 1rem;
    align-items: center;
  }

  .btn-danger {
    background: none;
    border: 1px solid var(--gaveup);
    color: #c080a0;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    padding: 0.5rem 1rem;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-danger:hover { background: rgba(128,64,96,0.15); }

  .loading-spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .search-loading {
    padding: 0.75rem;
    text-align: center;
    color: var(--text-muted);
    font-size: 0.85rem;
  }

  .api-note {
    background: rgba(232,93,38,0.1);
    border: 1px solid rgba(232,93,38,0.3);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    font-size: 0.82rem;
    color: var(--accent2);
    margin-bottom: 1rem;
    line-height: 1.5;
  }

  .api-note a { color: var(--cyan); }

  @media (max-width: 600px) {
    main { padding: 1rem; }
    .form-row { flex-direction: column; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">🎬</div>
      <div>
        <div class="logo-title">Reelhouse</div>
      </div>
      <span class="logo-sub" style="margin-left:6px">Watch Library</span>
    </div>
    <nav>
      <button class="active" onclick="showView('library')">Library</button>
      <button onclick="showView('stats')">Stats</button>
    </nav>
  </div>
</header>

<main>
  <!-- LIBRARY VIEW -->
  <div id="view-library">
    <div class="hero-strip">
      <div class="stat-pill">
        <div class="stat-num" id="stat-total">0</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-pill">
        <div class="stat-num" id="stat-movies">0</div>
        <div class="stat-label">Movies</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-pill">
        <div class="stat-num" id="stat-shows">0</div>
        <div class="stat-label">Shows</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-pill">
        <div class="stat-num" id="stat-watchlist">0</div>
        <div class="stat-label">Watchlist</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-pill">
        <div class="stat-num" id="stat-finished">0</div>
        <div class="stat-label">Finished</div>
      </div>
    </div>

    <div class="controls">
      <div class="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchFilter" placeholder="Search your library…" oninput="renderLibrary()">
      </div>
      <div class="filter-group">
        <button class="filter-btn f-active" data-filter="all" onclick="setFilter('all')">All</button>
        <button class="filter-btn" data-filter="watchlist" onclick="setFilter('watchlist')">Watchlist</button>
        <button class="filter-btn" data-filter="watching" onclick="setFilter('watching')">Watching</button>
        <button class="filter-btn" data-filter="finished" onclick="setFilter('finished')">Finished</button>
        <button class="filter-btn" data-filter="gaveup" onclick="setFilter('gaveup')">Gave Up</button>
      </div>
      <div class="filter-group">
        <button class="filter-btn f-active" data-type="all" onclick="setTypeFilter('all')">All Types</button>
        <button class="filter-btn" data-type="movie" onclick="setTypeFilter('movie')">Movies</button>
        <button class="filter-btn" data-type="show" onclick="setTypeFilter('show')">TV Shows</button>
      </div>
      <button class="add-btn" onclick="openAddModal()">
        <span style="font-size:1.1rem;line-height:1">+</span> Add
      </button>
    </div>

    <div class="streaming-row">
      <span class="streaming-label">Streaming:</span>
      <button class="stream-btn s-active" data-service="all" onclick="setServiceFilter('all')">All Services</button>
      <button class="stream-btn" data-service="Netflix" onclick="setServiceFilter('Netflix')">Netflix</button>
      <button class="stream-btn" data-service="Disney+" onclick="setServiceFilter('Disney+')">Disney+</button>
      <button class="stream-btn" data-service="Hulu" onclick="setServiceFilter('Hulu')">Hulu</button>
      <button class="stream-btn" data-service="HBO Max" onclick="setServiceFilter('HBO Max')">HBO Max</button>
      <button class="stream-btn" data-service="Prime Video" onclick="setServiceFilter('Prime Video')">Prime Video</button>
      <button class="stream-btn" data-service="Apple TV+" onclick="setServiceFilter('Apple TV+')">Apple TV+</button>
      <button class="stream-btn" data-service="Peacock" onclick="setServiceFilter('Peacock')">Peacock</button>
      <button class="stream-btn" data-service="Paramount+" onclick="setServiceFilter('Paramount+')">Paramount+</button>
      <button class="stream-btn" data-service="Other" onclick="setServiceFilter('Other')">Other</button>
    </div>

    <div class="grid" id="movieGrid"></div>
  </div>

  <!-- STATS VIEW -->
  <div id="view-stats" style="display:none">
    <h2 style="font-family:'Bebas Neue',sans-serif; color:var(--accent2); margin-bottom:1.5rem; font-size:2rem; letter-spacing:0.06em;">Watch Stats</h2>
    <div id="stats-content"></div>
  </div>
</main>

<!-- ADD MODAL -->
<div class="overlay" id="addOverlay" onclick="closeAddModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2>Add Movie or Show</h2>
      <button class="modal-close" onclick="closeAddModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="api-note" id="apiNote">
        🎬 Search powered by <strong>TMDB</strong>. To enable auto-search, add your free TMDB API key below. Get one free at <a href="https://www.themoviedb.org/settings/api" target="_blank">themoviedb.org</a> — takes 2 minutes!<br><br>
        <div style="display:flex;gap:0.5rem;align-items:center">
          <input type="text" id="tmdbKeyInput" placeholder="Paste your TMDB API key here…" style="flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:0.85rem;padding:0.5rem;border-radius:6px;outline:none">
          <button onclick="saveTmdbKey()" style="background:var(--accent);border:none;color:#fff;font-size:0.82rem;font-weight:700;padding:0.5rem 0.85rem;border-radius:6px;cursor:pointer;white-space:nowrap">Save Key</button>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex:2">
          <label>Search Title</label>
          <input type="text" id="apiSearch" placeholder="Search movies or shows…" oninput="debounceSearch()" autocomplete="off">
          <div id="apiResults"></div>
        </div>
      </div>
      <div style="text-align:center;color:var(--text-faint);font-size:0.78rem;margin:-0.5rem 0 1rem;letter-spacing:0.05em">— or fill in manually —</div>
      <div class="form-row">
        <div class="form-group" style="flex:2">
          <label>Title *</label>
          <input type="text" id="newTitle" placeholder="Title">
        </div>
        <div class="form-group">
          <label>Type</label>
          <select id="newType">
            <option value="movie">Movie</option>
            <option value="show">TV Show</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Year</label>
          <input type="text" id="newYear" placeholder="e.g. 2023">
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="newStatus">
            <option value="watchlist">Watchlist</option>
            <option value="watching">Watching</option>
            <option value="finished">Finished</option>
            <option value="gaveup">Gave Up</option>
          </select>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:1rem">
        <label>Poster URL (auto-filled from search)</label>
        <input type="text" id="newPoster" placeholder="https://…">
      </div>
      <div class="form-group" style="margin-bottom:1rem">
        <label>Summary (auto-filled from search)</label>
        <textarea id="newSummary" placeholder="Brief description…"></textarea>
      </div>
      <div class="form-group" style="margin-bottom:1rem">
        <label>Streaming Services</label>
        <div class="service-checkboxes" id="serviceChecks"></div>
      </div>
      <div class="form-group" style="margin-bottom:0.5rem">
        <label>Your Rating</label>
        <div class="star-rating-input" id="addStarRating">
          <button class="star-input" data-val="1" onclick="setAddRating(1)">★</button>
          <button class="star-input" data-val="2" onclick="setAddRating(2)">★</button>
          <button class="star-input" data-val="3" onclick="setAddRating(3)">★</button>
          <button class="star-input" data-val="4" onclick="setAddRating(4)">★</button>
          <button class="star-input" data-val="5" onclick="setAddRating(5)">★</button>
          <span class="star-label" id="addRatingLabel">No rating</span>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-secondary" onclick="closeAddModal()">Cancel</button>
        <button class="btn-primary" onclick="saveItem()">Add to Library</button>
      </div>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="overlay" id="detailOverlay" onclick="closeDetailModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2 id="detailModalTitle">Details</h2>
      <button class="modal-close" onclick="closeDetailModal()">&times;</button>
    </div>
    <div class="modal-body" id="detailModalBody"></div>
  </div>
</div>

<script>
const STORAGE_KEY = 'reelhouse_v1';
const TMDB_KEY_STORAGE = 'reelhouse_tmdb_key';
let items = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let tmdbKey = localStorage.getItem(TMDB_KEY_STORAGE) || '';
let currentFilter = 'all';
let currentTypeFilter = 'all';
let currentServiceFilter = 'all';
let addRating = 0;
let searchDebounce = null;
let selectedServices = [];

const RATING_LABELS = ['','Terrible','Alright','Good','Great','Amazing'];
const SERVICES = ['Netflix','Disney+','Hulu','HBO Max','Prime Video','Apple TV+','Peacock','Paramount+','Other'];
const TMDB_IMG = 'https://image.tmdb.org/t/p/w342';

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); }

function saveTmdbKey() {
  const k = document.getElementById('tmdbKeyInput').value.trim();
  if (!k) return;
  tmdbKey = k;
  localStorage.setItem(TMDB_KEY_STORAGE, k);
  document.getElementById('apiNote').innerHTML = '<span style="color:var(--watching)">✓ TMDB key saved! Search is now enabled.</span>';
}

function showView(v) {
  document.getElementById('view-library').style.display = v === 'library' ? '' : 'none';
  document.getElementById('view-stats').style.display = v === 'stats' ? '' : 'none';
  document.querySelectorAll('nav button').forEach((b,i) => {
    b.classList.toggle('active', (i===0&&v==='library')||(i===1&&v==='stats'));
  });
  if (v === 'stats') renderStats();
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn[data-filter]').forEach(b => {
    const isActive = b.dataset.filter === f;
    const cls = isActive ? (f==='all'?'f-active':`f-${f}`) : '';
    b.className = 'filter-btn' + (cls ? ' '+cls : '');
  });
  renderLibrary();
}

function setTypeFilter(t) {
  currentTypeFilter = t;
  document.querySelectorAll('.filter-btn[data-type]').forEach(b => {
    b.className = 'filter-btn' + (b.dataset.type === t ? ' f-active' : '');
  });
  renderLibrary();
}

function setServiceFilter(s) {
  currentServiceFilter = s;
  document.querySelectorAll('.stream-btn').forEach(b => {
    b.className = 'stream-btn' + (b.dataset.service === s ? ' s-active' : '');
  });
  renderLibrary();
}

function renderLibrary() {
  const q = document.getElementById('searchFilter').value.toLowerCase();
  let list = items.filter(item => {
    const mf = currentFilter === 'all' || item.status === currentFilter;
    const mt = currentTypeFilter === 'all' || item.type === currentTypeFilter;
    const ms = currentServiceFilter === 'all' || (item.services && item.services.includes(currentServiceFilter));
    const mq = !q || item.title.toLowerCase().includes(q);
    return mf && mt && ms && mq;
  });

  document.getElementById('stat-total').textContent = items.length;
  document.getElementById('stat-movies').textContent = items.filter(i=>i.type==='movie').length;
  document.getElementById('stat-shows').textContent = items.filter(i=>i.type==='show').length;
  document.getElementById('stat-watchlist').textContent = items.filter(i=>i.status==='watchlist').length;
  document.getElementById('stat-finished').textContent = items.filter(i=>i.status==='finished').length;

  const grid = document.getElementById('movieGrid');
  if (!list.length) {
    grid.innerHTML = `<div class="empty-state"><div style="font-size:2.5rem">🎬</div><p>Nothing here yet. Add something!</p></div>`;
    return;
  }

  grid.innerHTML = list.map(item => `
    <div class="movie-card" onclick="openDetail('${item.id}')">
      ${item.poster
        ? `<img class="movie-poster" src="${item.poster}" alt="${item.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : ''}
      <div class="movie-poster-placeholder" style="${item.poster?'display:none':''}">🎬</div>
      <span class="status-badge badge-${item.status}">${{watchlist:'Watchlist',watching:'Watching',finished:'Finished',gaveup:'Gave Up'}[item.status]||item.status}</span>
      <span class="type-overlay">${item.type==='show'?'TV':'Movie'}</span>
      <div class="movie-info">
        <div class="movie-title">${item.title}</div>
        <div class="movie-year">${item.year||''}</div>
        <div class="stars">${[1,2,3,4,5].map(i=>`<span class="star ${item.rating>=i?'filled':''}">★</span>`).join('')}</div>
        ${item.services&&item.services.length?`<div class="stream-tags">${item.services.map(s=>`<span class="stream-tag">${s}</span>`).join('')}</div>`:''}
      </div>
    </div>
  `).join('');
}

function toggleService(s, event) {
  if (event) event.preventDefault();
  const idx = selectedServices.indexOf(s);
  if (idx > -1) selectedServices.splice(idx,1);
  else selectedServices.push(s);
  const el = document.getElementById('sc_' + s.replace(/[^a-z]/gi,'_'));
  if (el) el.className = 'service-check' + (selectedServices.includes(s) ? ' checked' : '');
}

function openAddModal(editId) {
  document.getElementById('addOverlay').classList.add('open');
  selectedServices = [];
  resetAddForm();

  // Build service checkboxes via JS
  const sc = document.getElementById('serviceChecks');
  sc.innerHTML = SERVICES.map(s =>
    `<label class="service-check" id="sc_${s.replace(/[^a-z]/gi,'_')}" onclick="toggleService('${s}',event)"><input type="checkbox" value="${s}">${s}</label>`
  ).join('');

  if (editId) {
    const item = items.find(i => i.id === editId);
    if (item) {
      document.getElementById('newTitle').value = item.title || '';
      document.getElementById('newYear').value = item.year || '';
      document.getElementById('newPoster').value = item.poster || '';
      document.getElementById('newSummary').value = item.summary || '';
      document.getElementById('newStatus').value = item.status || 'watchlist';
      document.getElementById('newType').value = item.type || 'movie';
      selectedServices = [...(item.services || [])];
      selectedServices.forEach(s => {
        const el = document.getElementById('sc_' + s.replace(/[^a-z]/gi,'_'));
        if (el) el.className = 'service-check checked';
      });
      setAddRating(item.rating || 0);
      document.getElementById('addOverlay').dataset.editId = editId;
      document.querySelector('#addOverlay .modal-header h2').textContent = 'Edit Movie / Show';
      document.querySelector('#addOverlay .btn-primary').textContent = 'Save Changes';
    }
  } else {
    delete document.getElementById('addOverlay').dataset.editId;
    document.querySelector('#addOverlay .modal-header h2').textContent = 'Add Movie or Show';
    document.querySelector('#addOverlay .btn-primary').textContent = 'Add to Library';
  }

  if (tmdbKey) document.getElementById('apiNote').innerHTML = '<span style="color:var(--watching)">✓ TMDB key active. Search is enabled!</span>';
  else document.getElementById('tmdbKeyInput') && (document.getElementById('tmdbKeyInput').value = '');
}

function closeAddModal(e) {
  if (!e || e.target === document.getElementById('addOverlay')) {
    document.getElementById('addOverlay').classList.remove('open');
  }
}

function resetAddForm() {
  ['newTitle','newYear','newPoster','newSummary','apiSearch'].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
  document.getElementById('newStatus').value = 'watchlist';
  document.getElementById('newType').value = 'movie';
  document.getElementById('apiResults').innerHTML = '';
  SERVICES.forEach(s => {
    const el = document.getElementById('sc_' + s.replace(/[^a-z]/gi,'_'));
    if (el) el.className = 'service-check';
  });
  selectedServices = [];
  setAddRating(0);
}

function setAddRating(v) {
  addRating = v;
  document.querySelectorAll('#addStarRating .star-input').forEach((s,i) => s.classList.toggle('active', i<v));
  document.getElementById('addRatingLabel').textContent = v ? RATING_LABELS[v] : 'No rating';
}

function debounceSearch() {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(searchTMDB, 600);
}

async function searchTMDB() {
  const q = document.getElementById('apiSearch').value.trim();
  if (q.length < 2) { document.getElementById('apiResults').innerHTML=''; return; }
  if (!tmdbKey) {
    document.getElementById('apiResults').innerHTML = '<div class="search-result-list"><div class="search-loading">Add your TMDB key above to enable search.</div></div>';
    return;
  }
  document.getElementById('apiResults').innerHTML = '<div class="search-result-list"><div class="search-loading"><span class="loading-spinner"></span>Searching TMDB…</div></div>';
  try {
    const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${tmdbKey}&query=${encodeURIComponent(q)}&page=1`);
    const data = await res.json();
    const results = (data.results||[]).filter(r=>r.media_type==='movie'||r.media_type==='tv').slice(0,7);
    if (!results.length) {
      document.getElementById('apiResults').innerHTML = '<div class="search-result-list"><div class="search-loading">No results found.</div></div>';
      return;
    }
    document.getElementById('apiResults').innerHTML = `<div class="search-result-list">${results.map(r => {
      const isTV = r.media_type === 'tv';
      const title = isTV ? r.name : r.title;
      const year = (isTV ? r.first_air_date : r.release_date||'').slice(0,4);
      const poster = r.poster_path ? TMDB_IMG + r.poster_path : '';
      const thumb = r.poster_path ? 'https://image.tmdb.org/t/p/w92' + r.poster_path : '';
      const summary = r.overview || '';
      const type = isTV ? 'show' : 'movie';
      const obj = JSON.stringify({title, year, poster, summary, type}).replace(/"/g,'&quot;');
      return `<div class="search-result-item" onclick="fillFromResult(${obj})">
        ${thumb ? `<img class="result-thumb" src="${thumb}" onerror="this.src=''">` : `<div class="result-thumb" style="display:flex;align-items:center;justify-content:center;font-size:1.2rem">🎬</div>`}
        <div class="result-info">
          <div class="result-title">${title}</div>
          <div class="result-meta">${year} · ${isTV?'TV Show':'Movie'}</div>
        </div>
      </div>`;
    }).join('')}</div>`;
  } catch(e) {
    document.getElementById('apiResults').innerHTML = '<div class="search-result-list"><div class="search-loading">Search failed. Fill in manually.</div></div>';
  }
}

function fillFromResult(data) {
  document.getElementById('newTitle').value = data.title;
  document.getElementById('newYear').value = data.year || '';
  document.getElementById('newPoster').value = data.poster || '';
  document.getElementById('newSummary').value = data.summary || '';
  document.getElementById('newType').value = data.type;
  document.getElementById('apiResults').innerHTML = `<div style="padding:0.4rem 0;color:var(--watching);font-size:0.82rem">✓ Filled from TMDB</div>`;
  document.getElementById('apiSearch').value = data.title;
}

function saveItem() {
  const title = document.getElementById('newTitle').value.trim();
  if (!title) { alert('Please enter a title.'); return; }
  const editId = document.getElementById('addOverlay').dataset.editId;
  if (editId) {
    const item = items.find(i => i.id === editId);
    if (item) {
      item.title = title;
      item.type = document.getElementById('newType').value;
      item.year = document.getElementById('newYear').value.trim();
      item.poster = document.getElementById('newPoster').value.trim();
      item.summary = document.getElementById('newSummary').value.trim();
      item.status = document.getElementById('newStatus').value;
      item.services = [...selectedServices];
      item.rating = addRating;
    }
  } else {
    const item = {
      id: Date.now().toString(),
      title,
      type: document.getElementById('newType').value,
      year: document.getElementById('newYear').value.trim(),
      poster: document.getElementById('newPoster').value.trim(),
      summary: document.getElementById('newSummary').value.trim(),
      status: document.getElementById('newStatus').value,
      services: [...selectedServices],
      rating: addRating,
      review: '',
      added: new Date().toISOString()
    };
    items.unshift(item);
  }
  save();
  closeAddModal();
  renderLibrary();
}

function openDetail(id) {
  const item = items.find(i=>i.id===id);
  if (!item) return;
  document.getElementById('detailModalTitle').textContent = item.title;
  const servicesHTML = SERVICES.map(s => {
    const checked = item.services && item.services.includes(s);
    return `<label class="service-check ${checked?'checked':''}" id="ds_${s.replace(/[^a-z]/gi,'_')}" onclick="toggleDetailService('${id}','${s}',event)"><input type="checkbox" ${checked?'checked':''}>${s}</label>`;
  }).join('');

  document.getElementById('detailModalBody').innerHTML = `
    ${item.poster ? `<img class="detail-backdrop" src="${item.poster}" alt="" style="opacity:0.25;max-height:120px;width:100%;object-fit:cover;border-radius:12px 12px 0 0">` : ''}
    <div class="detail-top" style="${item.poster?'':'margin-top:0'}">
      ${item.poster
        ? `<div class="detail-poster" style="${item.poster?'':'margin-top:0'}"><img src="${item.poster}" alt="${item.title}"></div>`
        : `<div class="detail-poster-placeholder" style="margin-top:0">🎬</div>`}
      <div class="detail-meta">
        <div class="detail-title">${item.title}</div>
        <div class="detail-year">${item.year||''} · ${item.type==='show'?'TV Show':'Movie'}</div>
        <div style="margin-bottom:0.6rem">
          <select style="background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:0.82rem;padding:0.3rem 0.6rem;border-radius:6px;outline:none" onchange="updateItemField('${id}','status',this.value)">
            ${['watchlist','watching','finished','gaveup'].map(s=>`<option value="${s}" ${item.status===s?'selected':''}>${{watchlist:'Watchlist',watching:'Watching',finished:'Finished',gaveup:'Gave Up'}[s]}</option>`).join('')}
          </select>
        </div>
        <div class="detail-stars" id="dstars_${id}">
          ${[1,2,3,4,5].map(i=>`<span class="detail-star ${item.rating>=i?'filled':''}" onclick="updateItemRating('${id}',${i})">★</span>`).join('')}
          <span class="rating-desc" id="dratingDesc_${id}">${item.rating?RATING_LABELS[item.rating]:'No rating'}</span>
        </div>
      </div>
    </div>
    ${item.summary?`<div class="detail-summary">${item.summary}</div>`:''}
    <div class="detail-review-label" style="margin-bottom:0.4rem">Streaming On</div>
    <div class="service-checkboxes" style="margin-bottom:1rem">${servicesHTML}</div>
    <div class="detail-review-label">Your Review / Notes</div>
    <textarea class="detail-review-area" id="dreview_${id}" placeholder="Your thoughts…">${item.review||''}</textarea>
    <div class="detail-actions">
      <button class="btn-danger" onclick="deleteItem('${id}')">Remove</button>
      <div style="display:flex;gap:0.5rem">
        <button class="btn-secondary" onclick="closeDetailModal();openAddModal('${id}')">Edit</button>
        <button class="btn-primary" onclick="saveDetailReview('${id}')">Save</button>
      </div>
    </div>
  `;
  document.getElementById('detailOverlay').classList.add('open');
}

function toggleDetailService(id, s, event) {
  if (event) event.preventDefault();
  const item = items.find(i=>i.id===id);
  if (!item) return;
  if (!item.services) item.services=[];
  const idx = item.services.indexOf(s);
  if (idx>-1) item.services.splice(idx,1);
  else item.services.push(s);
  save();
  const el = document.getElementById('ds_' + s.replace(/[^a-z]/gi,'_'));
  if (el) el.className = 'service-check' + (item.services.includes(s)?' checked':'');
}

function closeDetailModal(e) {
  if (!e || e.target===document.getElementById('detailOverlay')) {
    document.getElementById('detailOverlay').classList.remove('open');
    renderLibrary();
  }
}

function updateItemField(id, field, value) {
  const item = items.find(i=>i.id===id);
  if (item) { item[field]=value; save(); }
}

function updateItemRating(id, val) {
  const item = items.find(i=>i.id===id);
  if (!item) return;
  item.rating = val; save();
  document.querySelectorAll(`#dstars_${id} .detail-star`).forEach((s,i)=>s.classList.toggle('filled',i<val));
  document.getElementById(`dratingDesc_${id}`).textContent = RATING_LABELS[val];
}

function saveDetailReview(id) {
  const area = document.getElementById(`dreview_${id}`);
  if (area) updateItemField(id,'review',area.value);
  closeDetailModal();
}

function deleteItem(id) {
  if (!confirm('Remove from library?')) return;
  items = items.filter(i=>i.id!==id);
  save(); closeDetailModal();
}

function renderStats() {
  const total = items.length;
  const finished = items.filter(i=>i.status==='finished');
  const avg = finished.filter(i=>i.rating).reduce((a,b)=>a+b.rating,0)/(finished.filter(i=>i.rating).length||1);
  const byStatus = {watchlist:0,watching:0,finished:0,gaveup:0};
  items.forEach(i=>byStatus[i.status]=(byStatus[i.status]||0)+1);
  const serviceCount = {};
  items.forEach(i=>(i.services||[]).forEach(s=>serviceCount[s]=(serviceCount[s]||0)+1));
  const topServices = Object.entries(serviceCount).sort((a,b)=>b[1]-a[1]).slice(0,6);

  document.getElementById('stats-content').innerHTML = `
    <div style="display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap">
      ${[['Total',total],['Movies',items.filter(i=>i.type==='movie').length],['TV Shows',items.filter(i=>i.type==='show').length],['Finished',finished.length],['Avg Rating',total&&finished.filter(i=>i.rating).length?avg.toFixed(1):'—']].map(([l,v])=>
        `<div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.5rem;flex:1;min-width:100px;text-align:center"><div style="font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:0.05em;color:var(--accent2)">${v}</div><div style="font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-faint);margin-top:0.2rem">${l}</div></div>`
      ).join('')}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;max-width:680px">
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem">
        <div style="font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-faint);margin-bottom:1rem">By Status</div>
        ${Object.entries(byStatus).map(([s,n])=>`
          <div style="display:flex;justify-content:space-between;margin-bottom:0.4rem;font-size:0.85rem">
            <span style="color:var(--text-muted)">${{watchlist:'Watchlist',watching:'Watching',finished:'Finished',gaveup:'Gave Up'}[s]}</span>
            <span style="color:var(--accent2);font-weight:700">${n}</span>
          </div>
          <div style="background:var(--border);height:3px;border-radius:2px;margin-bottom:0.75rem">
            <div style="background:var(--accent);height:3px;border-radius:2px;width:${total?(n/total*100).toFixed(0):0}%"></div>
          </div>
        `).join('')}
      </div>
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem">
        <div style="font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-faint);margin-bottom:1rem">Top Streaming Services</div>
        ${topServices.length ? topServices.map(([s,n])=>`
          <div style="display:flex;justify-content:space-between;margin-bottom:0.4rem;font-size:0.85rem">
            <span style="color:var(--cyan)">${s}</span>
            <span style="color:var(--text-muted);font-weight:700">${n}</span>
          </div>
        `).join('') : '<div style="color:var(--text-faint);font-size:0.85rem">No streaming data yet.</div>'}
      </div>
    </div>
  `;
}

renderLibrary();
</script>
</body>
</html>
